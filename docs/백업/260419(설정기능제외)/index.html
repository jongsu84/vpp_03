<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-VPP 2.0 통합 관제 플랫폼</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2236;--bg4:#1e2a3e;
  --acc:#00d4a8;--acc2:#0099ff;--acc3:#f59e0b;--acc4:#ef4444;--acc5:#a78bfa;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#475569;
  --brd:rgba(255,255,255,0.08);--brd2:rgba(0,212,168,0.3);
  --font:'Noto Sans KR',sans-serif;--mono:'IBM Plex Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:13px}
.shell{display:flex;height:100vh;width:100%}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:14px 14px 10px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:500;color:#000}
.logo-text{font-size:13px;font-weight:700;color:var(--txt)}
.logo-sub{font-size:9px;color:var(--txt2)}
.nav{flex:1;overflow-y:auto;padding:6px 0}
.nav::-webkit-scrollbar{width:2px}
.nav::-webkit-scrollbar-thumb{background:var(--brd2)}
.nav-group{margin-bottom:2px}
.nav-top{display:flex;align-items:center;gap:7px;padding:7px 10px;cursor:pointer;transition:all 0.15s;font-size:11px;font-weight:500;color:var(--txt2)}
.nav-top:hover,.nav-top.open{color:var(--txt)}
.nav-icon{width:14px;height:14px;flex-shrink:0}
.nav-sub{display:none}
.nav-sub.open{display:block}
.nav-item{display:flex;align-items:center;padding:5px 10px 5px 28px;cursor:pointer;transition:all 0.15s;border-left:2px solid transparent;font-size:11px;color:var(--txt2)}
.nav-item:hover{background:rgba(0,212,168,0.06);color:var(--acc)}
.nav-item.active{background:rgba(0,212,168,0.1);border-left-color:var(--acc);color:var(--acc)}
.sidebar-footer{padding:8px 10px;border-top:1px solid var(--brd)}
.status-bar{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--txt2)}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--acc);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:42px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.breadcrumb{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2)}
.breadcrumb span{color:var(--acc)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.kpi-pill{background:var(--bg3);border:1px solid var(--brd);border-radius:16px;padding:2px 10px;font-size:10px;font-family:var(--mono);color:var(--acc)}
.kpi-pill.warn{color:var(--acc3);border-color:rgba(245,158,11,0.3)}
.kpi-pill.danger{color:var(--acc4);border-color:rgba(239,68,68,0.3)}
.content{flex:1;overflow-y:auto;padding:16px;display:none}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}
.content.active{display:block}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:12px}
.g65{display:grid;grid-template-columns:1.6fr 1fr;gap:9px;margin-bottom:12px}
.card{background:var(--bg3);border:1px solid var(--brd);border-radius:8px;padding:12px;margin-bottom:0}
.card.mb{margin-bottom:12px}
.card.acc{border-color:var(--brd2)}
.ct{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px;font-family:var(--mono)}
.kv{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--txt);letter-spacing:-0.5px;line-height:1.1}
.ku{font-size:10px;color:var(--txt2);margin-left:2px}
.kd{font-size:10px;margin-top:2px}
.kd.up{color:var(--acc)}.kd.dn{color:var(--acc4)}.kd.neu{color:var(--acc3)}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.st{font-size:12px;font-weight:500;color:var(--txt)}
.sa{font-size:10px;color:var(--acc);cursor:pointer;font-family:var(--mono)}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{color:var(--txt2);font-weight:500;padding:5px 7px;border-bottom:1px solid var(--brd);text-align:left;font-family:var(--mono);font-size:9px;white-space:nowrap}
.tbl td{padding:5px 7px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--txt)}
.tbl tr:hover td{background:rgba(0,212,168,0.04)}
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-family:var(--mono)}
.ok{background:rgba(0,212,168,0.15);color:var(--acc)}
.warn{background:rgba(245,158,11,0.15);color:var(--acc3)}
.err{background:rgba(239,68,68,0.15);color:var(--acc4)}
.off{background:rgba(148,163,184,0.15);color:var(--txt2)}
.inf{background:rgba(0,153,255,0.15);color:var(--acc2)}
.pr{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.pl{font-size:10px;color:var(--txt2);width:70px;flex-shrink:0}
.pb{flex:1;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px}
.pv{font-family:var(--mono);font-size:9px;color:var(--txt);width:38px;text-align:right;flex-shrink:0}
.mr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.ml{font-size:10px;color:var(--txt2)}
.mv{font-family:var(--mono);font-size:11px;color:var(--txt)}
.al{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid var(--brd)}
.ad{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.am{font-size:10px;color:var(--txt);flex:1}
.at{font-family:var(--mono);font-size:9px;color:var(--txt2);white-space:nowrap}
.cb{padding:5px 12px;border-radius:4px;font-size:11px;font-family:var(--font);cursor:pointer;transition:all 0.15s;border:1px solid}
.cb.p{background:rgba(0,212,168,0.15);border-color:var(--brd2);color:var(--acc)}
.cb.p:hover{background:rgba(0,212,168,0.25)}
.cb.d{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.3);color:var(--acc4)}
.cb.n{background:var(--bg4);border-color:var(--brd);color:var(--txt)}
.inp{background:var(--bg4);border:1px solid var(--brd);border-radius:4px;padding:5px 9px;color:var(--txt);font-size:11px;font-family:var(--mono);width:100%;outline:none}
.inp:focus{border-color:var(--brd2)}
.sel{background:var(--bg4);border:1px solid var(--brd);border-radius:4px;padding:5px 9px;color:var(--txt);font-size:11px;width:100%;outline:none}
.fg{margin-bottom:10px}
.fl{font-size:10px;color:var(--txt2);margin-bottom:4px;display:block}
.toggle{position:relative;width:32px;height:16px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.ts{position:absolute;inset:0;background:var(--bg4);border-radius:8px;cursor:pointer;transition:0.3s;border:1px solid var(--brd)}
.ts:before{content:'';position:absolute;height:10px;width:10px;left:2px;top:2px;background:var(--txt2);border-radius:50%;transition:0.3s}
.toggle input:checked+.ts{background:rgba(0,212,168,0.3);border-color:var(--brd2)}
.toggle input:checked+.ts:before{transform:translateX(16px);background:var(--acc)}
.cslider{width:100%;-webkit-appearance:none;height:4px;background:var(--bg4);border-radius:2px;outline:none}
.cslider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--acc);cursor:pointer}
.mono{font-family:var(--mono)}
.dr{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--brd)}
.di{font-family:var(--mono);font-size:10px;color:var(--acc2);width:85px;flex-shrink:0}
.db{flex:1;height:7px;background:var(--bg4);border-radius:4px;overflow:hidden;position:relative}
.df{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--acc2),var(--acc))}
.dt{position:absolute;top:0;width:2px;height:100%;background:var(--acc3)}
.dp{font-family:var(--mono);font-size:10px;width:36px;text-align:right;flex-shrink:0}
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-mark">60Hz</div>
      <div><div class="logo-text">AI-VPP 2.0</div><div class="logo-sub">통합 관제 플랫폼</div></div>
    </div>
    <div class="nav" id="nav"></div>
    <div class="sidebar-footer">
      <div class="status-bar"><div class="status-dot"></div>실시간 연결 · E-Max</div>
    </div>
  </nav>
  <div class="main">
    <div class="topbar">
      <div class="breadcrumb" id="bc"><span>대시보드</span> / 통합 운영 대시보드</div>
      <div class="topbar-right">
        <div class="kpi-pill">148.7 MW</div>
        <div class="kpi-pill warn">IMBP 위험</div>
        <div class="kpi-pill danger">알람 7</div>
      </div>
    </div>
    <div id="pages"></div>
  </div>
</div>

<script>
const NAV=[
  {id:'dsh',label:'대시보드',sub:[
    {id:'dsh-main',label:'통합 운영 대시보드'},
    {id:'dsh-res',label:'자원별 상세 관제'},
    {id:'dsh-gis',label:'GIS 기반 자원 맵'},
    {id:'dsh-health',label:'설비 건전성 진단'},
  ]},
  {id:'his',label:'이력조회',sub:[
    {id:'his-gen',label:'발전이력'},
    {id:'his-dis',label:'총방전이력'},
    {id:'his-alm',label:'알람이력'},
    {id:'his-bid',label:'입찰/제어 이력'},
    {id:'his-out',label:'출력제어 이력'},
  ]},
  {id:'pre',label:'예측분석',sub:[
    {id:'pre-main',label:'예측분석'},
    {id:'pre-cross',label:'교차분석'},
    {id:'pre-mkt',label:'시장가/계통분석'},
    {id:'pre-model',label:'예측모델 비교'},
  ]},
  {id:'bid',label:'전력입찰',sub:[
    {id:'bid-dual',label:'이중 시장 입찰'},
    {id:'bid-cap',label:'입찰용량관리'},
    {id:'bid-sim',label:'정산 시뮬레이션'},
    {id:'bid-mgmt',label:'정산/배분 관리'},
  ]},
  {id:'sdp',label:'준중앙급전',sub:[
    {id:'sdp-del',label:'발전량인도'},
    {id:'sdp-con',label:'계약정보'},
    {id:'sdp-rev',label:'입찰수익'},
    {id:'sdp-set',label:'수익정산'},
  ]},
  {id:'ctl',label:'클릭제어',sub:[
    {id:'ctl-man',label:'수동출력제어'},
    {id:'ctl-cfg',label:'출력제어설정'},
    {id:'ctl-mon',label:'제어신호 모니터링'},
  ]},
  {id:'cfg',label:'설정',sub:[
    {id:'cfg-usr',label:'사용자관리'},
    {id:'cfg-gen',label:'발전기관리'},
    {id:'cfg-eqp',label:'설비관리'},
    {id:'cfg-rtu',label:'RTU관리'},
    {id:'cfg-grp',label:'그룹관리'},
    {id:'cfg-bat',label:'배치관리'},
  ]},
];

const ICONS={
  dsh:`<svg viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>`,
  his:`<svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M7 4v3.2l1.8 1.3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`,
  pre:`<svg viewBox="0 0 14 14" fill="none"><path d="M1 11L5 6.5l2.5 2.5L12 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  bid:`<svg viewBox="0 0 14 14" fill="none"><rect x="1" y="3" width="12" height="9" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M4 3V2h6v1M4 7h6M4 9.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`,
  sdp:`<svg viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 2l5 5-5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  ctl:`<svg viewBox="0 0 14 14" fill="none"><circle cx="4.5" cy="4.5" r="2" stroke="currentColor" stroke-width="1.2"/><circle cx="9.5" cy="9.5" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M6.5 4.5h5M2 9.5h5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`,
  cfg:`<svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M7 1v2M7 11v2M1 7h2M11 7h2M2.5 2.5l1.4 1.4M10.1 10.1l1.4 1.4M2.5 11.5l1.4-1.4M10.1 3.9l1.4-1.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`,
};

let cur='dsh-main';
const openGroups=new Set(['dsh']);

function buildNav(){
  const nav=document.getElementById('nav');
  NAV.forEach(g=>{
    const wrap=document.createElement('div');
    wrap.className='nav-group';
    const top=document.createElement('div');
    top.className='nav-top'+(openGroups.has(g.id)?' open':'');
    top.innerHTML=`<span class="nav-icon">${ICONS[g.id]}</span><span>${g.label}</span>`;
    const sub=document.createElement('div');
    sub.className='nav-sub'+(openGroups.has(g.id)?' open':'');
    top.onclick=()=>{
      if(openGroups.has(g.id))openGroups.delete(g.id);
      else openGroups.add(g.id);
      top.classList.toggle('open');
      sub.classList.toggle('open');
    };
    g.sub.forEach(s=>{
      const el=document.createElement('div');
      el.className='nav-item'+(s.id===cur?' active':'');
      el.id='ni-'+s.id;
      el.textContent=s.label;
      el.onclick=()=>activate(s.id);
      sub.appendChild(el);
    });
    wrap.appendChild(top);
    wrap.appendChild(sub);
    nav.appendChild(wrap);
  });
}

function activate(id){
  cur=id;
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ni-'+id);
  if(el) el.classList.add('active');
  renderPage(id);
  const g=NAV.find(g=>g.sub.find(s=>s.id===id));
  const s=g&&g.sub.find(s=>s.id===id);
  document.getElementById('bc').innerHTML=`<span>${g?g.label:''}</span> / ${s?s.label:''}`;
}

function renderPage(id){
  const pages=document.getElementById('pages');
  pages.innerHTML='';
  const d=document.createElement('div');
  d.className='content active';
  d.innerHTML=P[id]?P[id]():`<div style="padding:80px;text-align:center;color:var(--txt2);font-family:var(--mono)">[${id}] 준비 중</div>`;
  pages.appendChild(d);
  const fn=window['I_'+id];
  if(fn) setTimeout(fn,60);
}

function mkChart(id,type,labels,datasets,extra){
  const el=document.getElementById(id);
  if(!el)return;
  const existing=Chart.getChart(id);
  if(existing)existing.destroy();
  const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#64748b',font:{size:9},maxTicksLimit:8}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#64748b',font:{size:9}}}}};
  const opts=deepMerge(base,extra||{});
  if(type==='doughnut'||type==='pie'){delete opts.scales;}
  new Chart(el,{type,data:{labels:labels||[],datasets},options:opts});
}
function deepMerge(a,b){
  const r={...a};
  for(const k in b){
    if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k])&&a[k]&&typeof a[k]==='object')r[k]=deepMerge(a[k],b[k]);
    else r[k]=b[k];
  }
  return r;
}

const P={};

/* ===== 대시보드: 통합 운영 ===== */
P['dsh-main']=()=>`
<div class="g4">
  <div class="card acc"><div class="ct">실시간 총 출력</div><div class="kv">148.7<span class="ku">MW</span></div><div class="kd up">▲ 목표 대비 99.1%</div></div>
  <div class="card"><div class="ct">금일 누적 발전량</div><div class="kv">623.4<span class="ku">MWh</span></div><div class="kd up">▲ +3.2% 전일比</div></div>
  <div class="card"><div class="ct">금일 예상 수익</div><div class="kv">47.2<span class="ku">백만원</span></div><div class="kd neu">~ SMP 124원/kWh</div></div>
  <div class="card"><div class="ct">IMBP 위험 구간</div><div class="kv" style="color:var(--acc3)">2<span class="ku">구간</span></div><div class="kd dn">▼ 오차 11.4% 초과</div></div>
</div>
<div class="g65">
  <div class="card mb"><div class="sh"><div class="st">실시간 발전 곡선 (예측 vs 실측)</div><div class="sa">96구간</div></div><div style="height:200px;position:relative"><canvas id="c-dmain" role="img" aria-label="예측 vs 실측 비교"></canvas></div></div>
  <div class="card mb"><div class="sh"><div class="st">자원 구성</div></div><div style="height:120px;position:relative"><canvas id="c-donut" role="img" aria-label="에너지원 비중"></canvas></div>
  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;font-size:9px;font-family:var(--mono)"><span style="color:var(--acc)">■ 태양광 62%</span><span style="color:var(--acc2)">■ 풍력 18%</span><span style="color:var(--acc3)">■ ESS 12%</span><span style="color:var(--acc5)">■ 바이오 8%</span></div></div>
</div>
<div class="g2">
  <div class="card mb">
    <div class="sh"><div class="st">자원별 가동</div></div>
    <div class="pr"><div class="pl">태양광</div><div class="pb"><div class="pf" style="width:91%;background:var(--acc)"></div></div><div class="pv">91.4MW</div></div>
    <div class="pr"><div class="pl">풍력</div><div class="pb"><div class="pf" style="width:73%;background:var(--acc2)"></div></div><div class="pv">26.8MW</div></div>
    <div class="pr"><div class="pl">ESS 방전</div><div class="pb"><div class="pf" style="width:60%;background:var(--acc3)"></div></div><div class="pv">17.8MW</div></div>
    <div class="pr"><div class="pl">바이오</div><div class="pb"><div class="pf" style="width:82%;background:var(--acc5)"></div></div><div class="pv">12.7MW</div></div>
  </div>
  <div class="card mb">
